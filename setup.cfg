[nosetests]
verbosity=2
with-coverage=1
cover-package=.
cover-erase=1

[coverage:run]
branch = True

[coverage:report]
show_missing = True
omit =
    */tests/*

[flake8]
max-line-length = 88
exclude = .git,__pycache__,docs,build,dist
ignore = E203, W503

[pylint]
disable = C0114, C0115, C0116
max-line-length = 88
